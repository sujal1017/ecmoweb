<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}My Cart{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

/* PRODUCT CARD */
.product-card {
  height: 100%;
  display: flex;
  flex-direction: column;
  border-radius: 15px;
  overflow: hidden;
}

/* IMAGE WRAPPER */
.product-img-wrapper {
  height: 200px;              /* fixed uniform height */
  background: #ffffff;        /* clean white background */
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 15px;
  overflow: hidden;
}

/* IMAGE FIT */
.product-img-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* CAROUSEL ARROWS */
/* Reduce overlay width */
.carousel-control-prev,
.carousel-control-next {
  width: 5%;   /* shrink clickable area */
}

/* Make arrows clearly visible */
.carousel-control-prev-icon,
.carousel-control-next-icon {
  background-color: black;
  border-radius: 50%;
  padding: 10px;
}

/* Prevent overlap with content */
.carousel {
  padding: 0 40px;
}

  </style>

</head>

<body>

    <a class="navbar-cart" href="#">Cart(<span id="cart">0</span>)</a>
  </div>
</nav> -->

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">

    <!-- LEFT SIDE -->
    <div class="d-flex align-items-center">

      <a class="navbar-brand me-4" href="/shop/">My Cart</a>

      <!-- Menu -->
      <ul class="navbar-nav flex-row">
        <li class="nav-item me-3">

        </li>

        <li class="nav-item me-3">
          <a class="nav-link text-white" href="/shop/contact">Contact Us</a>
        </li>

        <li class="nav-item me-3">
          <a class="nav-link text-white" href="/shop/tracker">Tracker</a>
        </li>

        <li class="nav-item">
          <a class="nav-link text-white" href="/shop/about">About Us</a>
        </li>
      </ul>

    </div>

    <!-- Right Side Cart -->
    <ul class="navbar-nav ms-auto">
      <li class="nav-item">
        <a class="nav-link text-white" href="/shop/cart/">

</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
